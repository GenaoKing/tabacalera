{% extends 'base.html' %}

{% block content %}
<main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">
  <h2>Registro de Compra</h2>
  <form method="post"  id="formCompra">
    <div class="form-group">
      <label for="proveedorSelect">Proveedor</label>
      <select class="form-control" id="proveedorSelect" >
        <option value="">Seleccione un proveedor</option>
        {% for proveedor in proveedores %}
        <option value="{{ proveedor.id }}">{{ proveedor.nombre }}</option>
        {% endfor %}
      </select>
    </div>

    {% csrf_token %}
    {{ form.as_p }}

    <div class="form-group">
      <input type="hidden" id="id_proveedor" name="proveedor_id" value="">
      <label for="articulosCompradosTable">Artículos a Comprar</label>
      <table id="articulosCompradosTable" class="table table-striped table-bordered">
        <thead>
          <tr>
            <th>Descripción</th>
            <th>Inventario Actual</th>
            <th>Cantidad Mínima</th>
            <th>Cantidad Comprada</th>
            <th>Precio Compra</th>
            <th>Precio Venta</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="articulosCompradosBody">
          <!-- Los artículos comprados se cargarán aquí -->
        </tbody>
      </table>
    </div>

    <button type="submit" class="btn btn-primary">Guardar Compra</button>
  </form>
</main>

<script type="text/javascript">
  document.addEventListener('DOMContentLoaded', function() {
    var proveedorSelect = document.getElementById('proveedorSelect');

    proveedorSelect.addEventListener('change', function() {
      fetch(`obtener-articulos/?proveedor_id=${this.value}`)
        .then(response => response.json())
        .then(data => {
          var articulosCompradosBody = document.getElementById('articulosCompradosBody');
          articulosCompradosBody.innerHTML = ''; // Limpiar la tabla actual
          console.log(data)
          data.articulos.forEach((articulo, index) => {
            agregarDetalleCompra(articulo.id, articulo.descripcion, articulo.inventario_restante, articulo.cantidad_minima_orden);
          });
        })
        .catch(error => console.error('Error:', error));
    });
  });

  function agregarDetalleCompra(articuloId, descripcion, inventario, cantidadMinima) {
    var articulosCompradosBody = document.getElementById('articulosCompradosBody');

    var filaCompra = `
    <tr>
      <td data-articulo-id="${articuloId}">${descripcion}</td>
      <td>${inventario}</td>
      <td>${cantidadMinima}</td>
      <td><input type="number" data-campo="cantidad" class="form-control" value="1" min="1" required></td>
      <td><input type="number" data-campo="precioCompra" class="form-control" step="0.01" required></td>
      <td><input type="number" data-campo="precioVenta" class="form-control" step="0.01" required></td>
      <td><button type="button" class="btn btn-danger" onclick="eliminarDetalleCompra(this);">Eliminar</button></td>
    </tr>
    `;

    articulosCompradosBody.innerHTML += filaCompra;
}


  function eliminarDetalleCompra(button) {
    var row = button.parentNode.parentNode;
    row.parentNode.removeChild(row);
  }

  function generarJSONDetallesCompra() {
    var detallesCompra = [];
    var filas = document.querySelectorAll('#articulosCompradosBody tr');

    filas.forEach(function(fila) {
      var detalle = {
        articulo: fila.querySelector('td[data-articulo-id]').getAttribute('data-articulo-id'),
        cantidad: fila.querySelector('input[data-campo="cantidad"]').value,
        precio_compra: fila.querySelector('input[data-campo="precioCompra"]').value,
        precio_venta_sugerido: fila.querySelector('input[data-campo="precioVenta"]').value
      };
      detallesCompra.push(detalle);
    });

    return JSON.stringify(detallesCompra);
  }

  document.getElementById('formCompra').addEventListener('submit', function() {
      var proveedorSeleccionado = document.getElementById('proveedorSelect').value;
      document.getElementById('id_proveedor').value = proveedorSeleccionado;
  });


  document.getElementById('formCompra').addEventListener('submit', function(event) {
    event.preventDefault();
    var detallesCompraJSON = generarJSONDetallesCompra();
    var formData = new FormData(this);
    formData.append('detallesCompra', detallesCompraJSON);

    fetch(this.action, {
      method: 'POST',
      body: formData
    }).then(response => {
      if (response.ok) {
        console.log('Compra guardada con éxito');
        window.location.reload();
      } else {
        console.error('Error al guardar la compra');
        // Mostrar un mensaje de error
      }
    }).catch(error => console.error('Error:', error));
  });

 
</script>

{% endblock %}
